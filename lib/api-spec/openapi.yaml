openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: File Insight API — upload files, analyze with AI, explore results
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: analyses
    description: File analysis operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /analyses:
    get:
      operationId: listAnalyses
      tags: [analyses]
      summary: List all analyses
      responses:
        "200":
          description: List of analyses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Analysis"

    post:
      operationId: createAnalysis
      tags: [analyses]
      summary: Upload files and analyze with AI (multipart/form-data with files + optional prompt field)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalysisInput"
      responses:
        "201":
          description: Analysis created and processing started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Analysis"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /analyses/{id}:
    get:
      operationId: getAnalysis
      tags: [analyses]
      summary: Get a single analysis by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Analysis details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Analysis"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

    delete:
      operationId: deleteAnalysis
      tags: [analyses]
      summary: Delete an analysis
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted successfully
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ApiError:
      type: object
      required: [error]
      properties:
        error:
          type: string

    AnalysisInput:
      type: object
      properties:
        prompt:
          type: string
          description: Optional custom prompt or focus area for the analysis

    AnalysisNode:
      type: object
      required: [id, label, type]
      properties:
        id:
          type: string
        label:
          type: string
        type:
          type: string
          description: Node type (root, topic, metric, insight, detail)
        value:
          type: ["string", "null"]
        children:
          type: array
          items:
            $ref: "#/components/schemas/AnalysisNode"

    KeyMetric:
      type: object
      required: [label, value]
      properties:
        label:
          type: string
        value:
          type: string

    Analysis:
      type: object
      required: [id, title, status, fileNames, fileTypes, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        status:
          type: string
          description: "processing | complete | error"
        fileNames:
          type: array
          items:
            type: string
        fileTypes:
          type: array
          items:
            type: string
        summary:
          type: ["string", "null"]
        keyPoints:
          type: ["array", "null"]
          items:
            type: string
        keyMetrics:
          type: ["array", "null"]
          items:
            $ref: "#/components/schemas/KeyMetric"
        nodes:
          type: ["array", "null"]
          items:
            $ref: "#/components/schemas/AnalysisNode"
        errorMessage:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
